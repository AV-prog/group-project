<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script/script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/images/Logo-Vector.svg">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(59,130,246,0.18),_transparent_24%),radial-gradient(circle_at_bottom_right,_rgba(168,85,247,0.14),_transparent_22%),#eef2f7] text-slate-900 antialiased">
  <div class="min-h-screen">
    <!-- Navbar Section -->
    <nav class="relative w-full bg-white border-b border-[#B5B5B5] z-[10000] h-[80px] flex items-center justify-between px-8 sm:h-[88px] sm:px-[40px] lg:max-w-[1300px] lg:mx-auto lg:px-[80px]">
        <!-- Logo -->
        <div>
            <a href="index.html"><img id="navbar__logo" class="object-scale-down" src="images/cyber black.svg" alt="Cyber Logo"></a>
        </div>
    </nav>

    <main class="mx-auto grid max-w-[1180px] gap-6 px-4 py-6 sm:gap-10 sm:px-6 sm:py-10 lg:grid-cols-[1.25fr_1fr]">
      <section class="flex flex-col justify-center gap-8">
        <div class="max-w-xl rounded-[2.25rem] bg-white/95 p-6 sm:p-10 shadow-[0_40px_80px_rgba(15,23,42,0.08)]">
          <h1 class="mt-8 text-4xl font-bold leading-[0.95] tracking-[-0.04em] text-slate-950 sm:text-5xl lg:text-6xl">Create your account</h1>
          <p class="mt-6 max-w-2xl text-base leading-7 text-slate-600">Join cyber to get the best deals on premium tech and manage your orders from one dashboard.</p>
        </div>

        <div class="flex justify-start">
          <div
            class="w-full max-w-[420px] rounded-[2rem] bg-gradient-to-b from-slate-950/95 to-slate-900/95 p-6 sm:p-10 text-white shadow-[0_28px_60px_rgba(15,23,42,0.18)]">
            <div class="mb-7 flex items-center justify-between text-sm text-slate-300">
              <span>Our Bestseller</span>
              <span class="font-semibold text-white">$5499</span>
            </div>
            <div class="h-auto sm:h-auto overflow-hidden rounded-[1.75rem] bg-slate-950" w-2xl>
              <img src="images/vision-pro.png" alt="Vision Pro" class="transform-scale-auto w-full height-full object-cover object-center">
            </div>
            <p class="mt-7 text-sm leading-7 text-slate-300">Fast, sleek, and powerful ready for every day.</p>
          </div>
        </div>
      </section>

      <section class="self-center rounded-[2rem] bg-white p-6 sm:p-10 shadow-[0_40px_90px_rgba(15,23,42,0.08)]">
        <div class="mb-8">
          <h2 class="text-4xl font-semibold text-slate-950">Sign Up</h2>
          <p class="mt-2 text-sm text-slate-500">Use your email to create a new account.</p>
        </div>  
        <form class="grid gap-5" action="products.html">
          <label class="grid gap-3 text-sm text-slate-700"> 
            <span>Full Name</span>
            <input type="text" placeholder="John Doe" required class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <label class="grid gap-3 text-sm text-slate-700">
            <span>Email address</span> 
            <input type="email" placeholder="name@example.com" required class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <label class="grid gap-3 text-sm text-slate-700">
            <span>Password</span>
            <input type="password" placeholder="Create a password" required class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <label class="grid gap-3 text-sm text-slate-700">
            <span>Confirm password</span>
            <input type="password" placeholder="Confirm password" required class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <button type="submit" class="w-full rounded-[1.125rem] bg-violet-700 px-5 py-4 text-center text-sm font-semibold text-white shadow-[0_18px_30px_rgba(67,56,202,0.2)] transition hover:bg-violet-800">Create account</button>
          <p class="text-center text-sm text-slate-500">Already have an account? <a class="font-semibold text-violet-600 hover:text-violet-700" href="login.html">Sign in</a></p>
        </form>
      </section>
    </main>
  </div>
  
</body>
</html>
