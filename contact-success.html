<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* subtle fade in */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* glow effect */
        .glow {
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Loading Screen -->
    <div id="loading-screen" class="text-center fade-in">

        <div class="relative w-16 h-16 mx-auto mb-6">
            <div class="absolute inset-0 border-4 border-gray-200 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-black rounded-full border-t-transparent animate-spin"></div>
        </div>

        <h2 class="text-xl font-semibold text-gray-900 mb-2">
            Please wait
        </h2>

        <!-- Progress -->
        <div class="w-64 h-1.5 bg-gray-200 rounded-full mt-6 mx-auto overflow-hidden">
            <div id="progress-bar"
                class="h-full bg-gradient-to-r from-black via-gray-700 to-black w-0 transition-all duration-[5000ms] ease-out">
            </div>
        </div>

    </div>

    <!-- Success Card -->
    <div id="success-card"
        class="hidden bg-white rounded-3xl glow p-8 md:p-12 max-w-md w-full text-center fade-in">

        <!-- Icon -->
        <div
            class="w-20 h-20 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">
            Message Sent!
        </h1>

        <p class="text-gray-500 mb-8">
            Your message has been sent successfully.
        </p>

        <!-- Details -->
        <div class="bg-gray-50 rounded-xl p-4 mb-8 space-y-2 text-left text-sm flex flex-col items-center">
            <span class="text-gray-500">Thank you for your feedback!</span>
            <span class="font-medium text-gray-900">We'd get back to you soon.</span>
        </div>

        <!-- Buttons -->
        <div class="space-y-3">

            <button
                class="w-full bg-black text-white font-medium py-3 px-6 rounded-xl hover:scale-105 hover:shadow-lg transition-all duration-300"
                onclick="goToProducts()">
                Continue Shopping
            </button>

            <button
                class="w-full bg-white text-gray-700 font-medium py-3 px-6 rounded-xl border border-gray-200 hover:border-black hover:shadow-sm transition-all duration-300"
                onclick="goToPayment()">
                View Order Details
            </button>

        </div>

    </div>

    <script>
        // animate progress
        setTimeout(() => {
            document.getElementById('progress-bar').classList.remove('w-0');
            document.getElementById('progress-bar').classList.add('w-full');
        }, 100);

        // delay
        const delay = Math.floor(Math.random() * 2000) + 2000;

        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');
        }, delay);

        function goToProducts() {
            window.location.href = 'products.html';
        }

        function goToPayment() {
            window.location.href = 'payment.html';
        }
    </script>

</body>

</html>
