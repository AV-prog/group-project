<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Login </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/09dda602fe.js" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/353bd79a2e.js" crossorigin="anonymous"></script>
  <script src="script/script.js" defer></script>
  <link rel="icon" type="image/png" href="/images/Logo-Vector.svg">
</head>

<body
  class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(59,130,246,0.18),_transparent_24%),radial-gradient(circle_at_bottom_right,_rgba(168,85,247,0.14),_transparent_22%),#eef2f7] text-slate-900 antialiased">
  <div class="min-h-screen">
   <nav
        class="relative w-full max-w-[1300px] h-[88px]  max-[960px]:h-[80px] bg-[#FFFFFF] flex items-center justify-between py-[16px] max-[960px]:py-0 px-[24px] md:px-[40px] lg:px-[60px] mx-auto z-[1]">
        <div class="max-[960px]:pl-[25px]">
          <a href="index.html">
            <img class="object-scale-down" src="images/cyber black.svg" alt="Cyber Logo">
          </a>
        </div>
    </nav>

    
    <main class="mx-auto grid max-w-[1180px] gap-6 px-4 py-6 sm:gap-10 sm:px-6 sm:py-10 lg:grid-cols-[1.25fr_1fr]">
      <section class="flex flex-col justify-center gap-8">
        <div class="max-w-xl rounded-[2.25rem] bg-white/95 p-6 sm:p-10 shadow-[0_40px_80px_rgba(15,23,42,0.08)]">
           <div class="logo">
                        <img src="../images/cyber white.svg" alt="logo">
                    </div>
          <h1 class="mt-8 text-4xl font-bold leading-[0.95] tracking-[-0.04em] text-slate-950 sm:text-5xl lg:text-6xl">Welcome back!
          </h1>
          <p class="mt-6 max-w-2xl text-base leading-7 text-slate-600">Sign in to access your account and continue
            shopping premium tech products.</p>
        </div>

        <div class="flex justify-start">
          <div
            class="w-full max-w-[420px] rounded-[2rem] bg-gradient-to-b from-slate-950/95 to-slate-900/95 p-6 sm:p-10 text-white shadow-[0_28px_60px_rgba(15,23,42,0.18)]">
            <div class="mb-7 flex items-center justify-between text-sm text-slate-300">
              <span>Our Bestseller</span>
              <span class="font-semibold text-white">$5499</span>
            </div>
            <div class="h-auto sm:h-auto overflow-hidden rounded-[1.75rem] bg-slate-950" w-2xl>
              <img src="images/vision-pro.png" alt="Vision Pro" class="transform-scale-auto w-full height-full object-cover object-center">
            </div>
            <p class="mt-7 text-sm leading-7 text-slate-300">Fast, sleek, and powerful ready for every day.</p>
          </div>
        </div>
      </section>

      <section class="self-center rounded-[2rem] bg-white p-6 sm:p-10 shadow-[0_40px_90px_rgba(15,23,42,0.08)]">
        <div class="mb-8">
          <h2 class="text-4xl font-semibold text-slate-950">Sign In</h2>
          <p class="mt-2 text-sm text-slate-500">Enter your details to continue to your dashboard.</p>
        </div>
        <form class="grid gap-5" action="products.html">
          <label class="grid gap-3 text-sm text-slate-700">
            <span>Email address</span>
            <input type="email" placeholder="name@example.com" required
              class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <label class="grid gap-3 text-sm text-slate-700">
            <span>Password</span>
            <input type="password" placeholder="Enter your password" required
              class="rounded-[1.125rem] border border-slate-200 bg-slate-50 px-4 py-4 text-sm text-slate-900 outline-none transition focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10">
          </label>
          <div class="flex flex-wrap items-center justify-between gap-4">
            <label class="inline-flex items-center gap-3 text-sm text-slate-600">
              <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-500">
              <span>Remember me</span>
            </label>
            <a class="text-sm font-medium text-violet-600 hover:text-violet-700" href="forgot-password.html">Forgot password?</a>
          </div>
          <button type="submit"
            class="w-full rounded-[1.125rem] bg-violet-700 px-5 py-4 text-sm font-semibold text-white shadow-[0_18px_30px_rgba(67,56,202,0.2)] transition hover:bg-violet-800">Log
            in</button>
          <div class="mt-6 flex items-center gap-3 text-xs text-slate-400">
            <hr class="h-px flex-1 border-0 bg-slate-200">
            <span>or continue with</span>
            <hr class="h-px flex-1 border-0 bg-slate-200">
          </div>
          <div class="mt-5 grid gap-3 sm:grid-cols-2">
            <i class="fa-brands fa-google text-xl rounded-[1.125rem] w-[200px] border border-slate-200 bg-slate-100 px-5 py-4 font-semibold text-slate-900 transition hover:bg-slate-200"></i>
            <i class="fa-brands fa-apple text-2xl rounded-[1.125rem] w-[200px] border border-slate-200 bg-slate-100 px-5 py-4 font-semibold text-slate-900 transition hover:bg-slate-200"></i>
          </div>
        </form>
        <p class="mt-8 text-sm text-slate-500">Don’t have an account? <a
            class="font-semibold text-violet-600 hover:text-violet-700" href="signup.html">Create one</a></p>
      </section>
    </main>
  </div>
</body>

</html>
