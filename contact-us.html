<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script/script.js" defer></script>
    <link rel="icon" type="image/png" href="images/Logo-Vector.svg">
    <title>Contact Us</title>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-[#FFFFFF]">
    <!-- Navbar Section -->
    <nav class="relative w-full bg-white sm:border-b sm:border-[#B5B5B5] z-[10000] h-[80px] flex items-center justify-between px-5 sm:h-[88px] sm:px-[80px] lg:max-w-[1300px] lg:mx-auto lg:px-[140px]">
        <!-- Logo -->
        <div>
            <img id="navbar__logo" class="object-scale-down" src="images/cyber black.svg" alt="Cyber Logo">
        </div>

        <!-- Desktop Search -->
        <div class="search relative hidden sm:block">
            <input type="text" placeholder="Search" class="w-[280px] h-[48px] bg-[#F5F5F5] pl-10 text-[#656565] text-base font-medium outline-none rounded-lg p-4 lg:w-[326px] lg:h-[56px]">
            <div class="search-icon absolute w-5 h-5 left-3 top-1/2 -translate-y-1/2 lg:w-6 lg:h-6">
                <i class="fa-sharp fa-solid fa-magnifying-glass text-[#656565]"></i>
            </div>
        </div>

        <!-- Mobile Search Toggle -->
        <button id="mobile-search-toggle" class="absolute top-1/2 right-[22%] -translate-y-1/2 z-[100] sm:hidden" aria-label="Toggle search" aria-expanded="false">
            <i class="fa-sharp fa-solid fa-magnifying-glass opacity-60 text-black"></i>
        </button>

        <!-- Mobile Search Dropdown -->
        <div id="mobile-search-dropdown" class="absolute left-0 top-full w-full px-6 py-2.5 bg-white border-b border-[#B5B5B5] opacity-0 -translate-y-2 pointer-events-none transition-all duration-300 ease-in-out z-[98] sm:hidden">
            <div class="relative">
                <input type="text" placeholder="Search" class="w-full h-12 bg-[#F5F5F5] pl-10 text-[#656565] text-base font-medium outline-none rounded-lg p-3">
                <div class="absolute w-6 h-6 left-3 top-1/2 -translate-y-1/2">
                    <i class="fa-sharp fa-solid fa-magnifying-glass text-[#656565]"></i>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu Toggle -->
        <button id="mobile-menu" class=" absolute top-[25%] right-[5%] translate-x-[5%] translate-y-[20%] z-[100]sm:hidden lg:hidden" aria-label="Toggle menu" aria-expanded="false">
            <span id="bar1" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar2" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar3" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
        </button>

        <!-- Navbar Menu -->
        <div id="navbar-menu" class="nav fixed inset-x-0 top-[80px] bg-white transition-all duration-500 ease-in-out z-[99] overflow-hidden max-h-0 sm:static sm:max-h-none sm:overflow-visible sm:flex sm:items-center sm:gap-x-11 sm:bg-transparent sm:w-auto lg:gap-x-[45px] [&.active]:max-h-[60vh] [&.active]:border-b [&.active]:border-[#B5B5B5]">
            <a id="home-page" href="index.html" class="block w-[20px] sm:w-full px-6 py-4 text-lg font-medium text-black opacity-60 hover:opacity-100 transition-opacity sm:inline sm:px-0 sm:py-0 sm:text-base sm:opacity-30 sm:hover:opacity-100">Home</a>
            <a id="about-page" href="about.html" class="block w-[20px] sm:w-full px-6 py-4 text-lg font-medium text-black opacity-60 hover:opacity-100 transition-opacity sm:inline sm:px-0 sm:py-0 sm:text-base sm:opacity-30 sm:hover:opacity-100">About</a>
            <a id="contact-us-page" href="contact-us.html" class="block w-[20px] sm:w-full px-6 py-4 text-lg font-medium text-black opacity-60 hover:opacity-100 transition-opacity whitespace-nowrap sm:inline sm:px-0 sm:py-0 sm:text-base sm:opacity-30 sm:hover:opacity-100">Contact Us</a>
            <a id="blog-page" href="blog.html" class="block w-[20px] sm:w-full px-6 py-4 text-lg font-medium text-black opacity-60 hover:opacity-100 transition-opacity sm:inline sm:px-0 sm:py-0 sm:text-base sm:opacity-30 sm:hover:opacity-100">Blog</a>

            <!-- Mobile Icons in Menu -->
            <div class="flex justify-evenly items-center gap-6 px-6 py-6 border-t border-[#E5E5E5] sm:hidden">
                <a href="" class="text-xl"><i class="fa-regular fa-heart text-black"></i></a>
                <a href="shopping cart.html" class="text-xl"><i class="fa-solid fa-cart-shopping text-black"></i></a>
                <a href="login.html" class="text-xl"><i class="fa-regular fa-user text-black"></i></a>
            </div>
        </div>

        <!-- Desktop Icons -->
        <div class="hidden sm:flex items-center justify-between w-[126px] h-8 ml-5">
            <a href="" class="h-8 w-8 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity">
                <i class="fa-regular fa-heart text-black"></i>
            </a>
            <a href="shopping cart.html" class="h-8 w-8 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity">
                <i class="fa-solid fa-cart-shopping text-black"></i>
            </a>
            <a href="login.html" class="h-8 w-8 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity">
                <i class="fa-regular fa-user text-black"></i>
            </a>
        </div>
    </nav>

  <section class="flex justify-center items-center mt-[80px] mb-[60px] px-4">
  <div class="w-full max-w-[900px] grid md:grid-cols-2 rounded-xl border border-gray-200 bg-white overflow-hidden">

    <!-- LEFT: CONTACT INFO -->
    <div class="bg-[#000000] text-white p-8 flex flex-col justify-between">

      <div>
        <h2 class="text-[20px] font-semibold text-white">Contact Information</h2>
        <p class="mt-2 text-sm text-gray-400">
          Reach out to us anytime. We’re always ready to help.
        </p>
      </div>

      <div class="mt-8 space-y-5 text-sm text-white-700">
        <p class="flex items-center gap-3">
          <i class="fa-solid fa-phone text-white-400"></i>
          +234 812 345 6789
        </p>

        <p class="flex items-center gap-3">
          <i class="fa-solid fa-envelope text-white-400"></i>
          hello@colorbyav.com
        </p>

        <p class="flex items-center gap-3">
          <i class="fa-solid fa-location-dot text-white-400"></i>
          Lagos, Nigeria
        </p>
      </div>

      <div class="mt-8 flex gap-4 text-white-400 text-lg">
        <i class="fa-brands fa-twitter hover:text-black transition"></i>
        <i class="fa-brands fa-instagram hover:text-black transition"></i>
        <i class="fa-brands fa-linkedin hover:text-black transition"></i>
      </div>

    </div>

    <!-- RIGHT: FORM -->
    <div class="p-8">
      <h2 class="text-[20px] font-semibold text-black">Send a Message</h2>

      <form class="flex flex-col gap-5 mt-6">

        <input type="text" placeholder="Full Name"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <input type="email" placeholder="Email Address"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <input type="text" placeholder="Subject"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <textarea rows="4" placeholder="Your message..."
          class="p-3 border border-gray-200 rounded-md text-sm outline-none resize-none focus:border-black transition"></textarea>

        <button type="button" onclick="goToContactSuccess()"
                            class="flex-1 py-3 bg-black text-white rounded-lg font-medium hover:bg-white hover:text-black border hover:border-black transition-background duration-200 text-sm">
                            Send Message
                        </button>

      </form>
    </div>

  </div>
</section>

  <footer>
    <p class="text-[11px] text-center mb-5">
      Challenge by 
      <a href="#" class="text-[hsl(228,45%,44%)] hover:text-[hsl(5,65%,34%)] transition">
        Frontend Mentor
      </a>. 
      Coded by <a href="#">AV</a>.
    </p>
  </footer>

  <script>
        function goToContactSuccess() {
            window.location.href = "contact-success.html";
        }
    </script>

</body>
</html>
