<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script/script.js" defer></script>
    <link rel="icon" type="image/png" href="images/Logo-Vector.svg">
    <title>Contact Us</title>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-[#FFFFFF]">
     <!-- Navbar Section -->
    <nav class="relative w-full max-w-[1300px] h-[88px] max-[960px]:h-[80px] border-b-[1px] border-b-[#B5B5B5] bg-[#FFFFFF] flex items-center justify-between py-[16px] max-[960px]:py-0 px-[140px] max-[960px]:px-0 mx-auto z-[10000]">
        <div class="max-[960px]:pl-[25px]">
            <img class="object-scale-down" src="images/cyber black.svg" alt="Cyber Logo">
        </div>

        <div class="search relative max-[960px]:hidden">
            <input type="text" placeholder="Search" class="w-[326px] h-[56px] bg-[#F5F5F5] pl-[38px] text-[#656565] font-inter text-[16px] font-medium outline-none rounded-[8px] p-[16px] gap-x-[8px]">
            <div class="search-icon absolute w-[24px] h-[24px] left-[12px] top-1/2 -translate-y-1/2">
                <i class="fa-sharp fa-solid fa-magnifying-glass" style="color:#656565;"></i>
            </div>
        </div>

        <button id="mobile-search-toggle" class="hidden max-[960px]:block absolute top-[50%] right-[22%] -translate-y-1/2 z-[100] max-[960px]:left-[305px]" aria-label="Toggle search" aria-expanded="false">
            <i class="fa-sharp fa-solid fa-magnifying-glass opacity-60" style="color:#000000;"></i>
        </button>

        <div id="mobile-search-dropdown" class="hidden max-[960px]:block absolute left-0 top-full w-full px-[25px] py-[10px] bg-[#FFFFFF] border-b-[1px] border-b-[#B5B5B5] opacity-0 -translate-y-2 pointer-events-none transition-all duration-300 ease-in-out z-[98]">
            <div class="relative">
                <input type="text" placeholder="Search" class="w-full h-[48px] bg-[#F5F5F5] pl-[38px] text-[#656565] font-inter text-[16px] font-medium outline-none rounded-[8px] p-[12px]">
                <div class="absolute w-[24px] h-[24px] left-[12px] top-1/2 -translate-y-1/2">
                    <i class="fa-sharp fa-solid fa-magnifying-glass" style="color:#656565;"></i>
                </div>
            </div>
        </div>

        <button id="mobile-menu" class="hidden max-[960px]:block absolute top-[25%] right-[5%] translate-x-[5%] translate-y-[20%] z-[100]" aria-label="Toggle menu" aria-expanded="false">
            <span id="bar1" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar2" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar3" class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
        </button>

        <div id="navbar-menu" class="nav h-[19px] w-[323px] flex items-center gap-x-[45px] max-[960px]:grid max-[960px]:grid-cols-1 max-[960px]:gap-y-0 max-[960px]:m-0 max-[960px]:w-full max-[960px]:absolute max-[960px]:left-0 max-[960px]:top-[-1000px] max-[960px]:opacity-100 max-[960px]:transition-all max-[960px]:duration-500 max-[960px]:ease-in-out max-[960px]:z-[-1] max-[960px]:[&.active]:bg-[#ffffff] max-[960px]:[&.active]:top-full max-[960px]:[&.active]:z-[99] max-[960px]:[&.active]:h-[60vh] max-[960px]:[&.active]:text-[1.6rem] max-[960px]:[&.active]:p-0">
            <span class="font-inter text-[16px] font-medium text-[#000000] w-[46px] h-[19px] leading-none opacity-30 max-[960px]:w-full max-[960px]:opacity-100 hover:opacity-100 transition-opacity duration-300">
                <a id="home-page" class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[30px]" href="index.html">Home</a>
            </span>
            <span class="w-[46px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none max-[960px]:w-full max-[960px]:opacity-100 hover:opacity-100 transition-opacity duration-300">
                <a id="about-page" class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[80px]" href="about.html">About</a>
            </span>
            <span class="w-[86px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none whitespace-nowrap max-[960px]:w-full max-[960px]:opacity-100 hover:opacity-100 transition-opacity duration-300">
                <a id="contact-page" class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[130px]" href="contact-us.html">Contact Us </a>
            </span>
            <span class="w-[34px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none max-[960px]:w-full max-[960px]:opacity-100 hover:opacity-100 transition-opacity duration-300">
                <a id="blog-page" class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[180px]" href="blog.html">Blog</a>
            </span>
        </div>
        <div class="icons w-[126px] h-[32px] flex items-center justify-between max-[960px]:flex max-[960px]:w-full max-[960px]:justify-center max-[960px]:gap-x-[10px] mt-[8px] ml-[20px]">
            <span class="h-[32px] w-[32px] opacity-60 hover:opacity-100 transition-opacity duration-300" >
                <a href="">
                    <i class="fa-regular fa-heart" style="color:#000000;"></i>
                </a>
            </span>
            <span class="h-[32px] w-[32px] opacity-60 hover:opacity-100 transition-opacity duration-300">
                <a href="shopping cart.html">
                    <i class="fa-solid fa-cart-shopping" style="color:#000000;"></i>
                </a>
            </span>
            <span class="h-[32px] w-[32px] opacity-60 hover:opacity-100 transition-opacity duration-300">
                <a href="login.html">
                    <i class="fa-regular fa-user" style="color:#000000;"></i>
                </a>
            </span>
        </div>
    </nav>

  <section class="flex justify-center items-center mt-[80px] mb-[60px] px-4">
  <div class="w-full max-w-[900px] grid md:grid-cols-2 rounded-xl border border-gray-200 bg-white overflow-hidden">

    <!-- LEFT: CONTACT INFO -->
    <div class="bg-[#000000] text-white p-8 flex flex-col justify-between">

      <div>
        <h2 class="text-[20px] font-semibold text-white">Contact Information</h2>
        <p class="mt-2 text-sm text-gray-400">
          Reach out to us anytime. We’re always ready to help.
        </p>
      </div>

      <div class="mt-8 space-y-5 text-sm text-white-700">
        <p class="flex items-center gap-3">
          <i class="fa-solid fa-phone text-white-400"></i>
          +234 812 345 6789
        </p>

        <p class="flex items-center gap-3">
          <i class="fa-solid fa-envelope text-white-400"></i>
          hello@colorbyav.com
        </p>

        <p class="flex items-center gap-3">
          <i class="fa-solid fa-location-dot text-white-400"></i>
          Lagos, Nigeria
        </p>
      </div>

      <div class="mt-8 flex gap-4 text-white-400 text-lg">
        <i class="fa-brands fa-twitter hover:text-black transition"></i>
        <i class="fa-brands fa-instagram hover:text-black transition"></i>
        <i class="fa-brands fa-linkedin hover:text-black transition"></i>
      </div>

    </div>

    <!-- RIGHT: FORM -->
    <div class="p-8">
      <h2 class="text-[20px] font-semibold text-black">Send a Message</h2>

      <form class="flex flex-col gap-5 mt-6">

        <input type="text" placeholder="Full Name"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <input type="email" placeholder="Email Address"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <input type="text" placeholder="Subject"
          class="p-3 border border-gray-200 rounded-md text-sm outline-none focus:border-black transition">

        <textarea rows="4" placeholder="Your message..."
          class="p-3 border border-gray-200 rounded-md text-sm outline-none resize-none focus:border-black transition"></textarea>

        <button type="button" onclick="goToContactSuccess()"
                            class="flex-1 py-3 bg-black text-white rounded-lg font-medium hover:bg-white hover:text-black border hover:border-black transition-background duration-200 text-sm">
                            Send Message
                        </button>

      </form>
    </div>

  </div>
</section>

  <footer>
    <p class="text-[11px] text-center mb-5">
      Challenge by 
      <a href="#" class="text-[hsl(228,45%,44%)] hover:text-[hsl(5,65%,34%)] transition">
        Frontend Mentor
      </a>. 
      Coded by <a href="#">AV</a>.
    </p>
  </footer>

  <script>
        function goToContactSuccess() {
            window.location.href = "contact-success.html";
        }
    </script>

</body>
</html>
