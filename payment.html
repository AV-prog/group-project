<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/09dda602fe.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/353bd79a2e.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="images/Logo-Vector-blck.svg">
    <title>Cyber</title>
</head>

<body>
    <!-- Navbar Section -->
    <nav
        class="relative w-full max-w-[1300px] h-[88px] max-[960px]:h-[80px] border-b-[1px] border-b-[#B5B5B5] bg-[#FFFFFF] flex items-center justify-between py-[16px] max-[960px]:py-0 px-[140px] max-[960px]:px-0 mx-auto z-[10000]">
        <div class="max-[960px]:pl-[25px]">
            <img class="object-scale-down" src="images/Logo-Vector-blck.svg" alt="Cyber Logo">
        </div>

        <div class="search relative max-[960px]:hidden">
            <input type="text" placeholder="Search"
                class="w-[326px] h-[56px] bg-[#F5F5F5] pl-[38px] text-[#656565] font-inter text-[16px] font-medium outline-none rounded-[8px] p-[16px] gap-x-[8px]">
            <div class="search-icon absolute w-[24px] h-[24px] left-[12px] top-1/2 -translate-y-1/2">
                <i class="fa-sharp fa-solid fa-magnifying-glass" style="color:#656565;"></i>
            </div>
        </div>

        <button id="mobile-search-toggle"
            class="hidden max-[960px]:block absolute top-[50%] right-[22%] -translate-y-1/2 z-[100] max-[960px]:left-[305px]"
            aria-label="Toggle search" aria-expanded="false">
            <i class="fa-sharp fa-solid fa-magnifying-glass opacity-60" style="color:#000000;"></i>
        </button>

        <div id="mobile-search-dropdown"
            class="hidden max-[960px]:block absolute left-0 top-full w-full px-[25px] py-[10px] bg-[#FFFFFF] border-b-[1px] border-b-[#B5B5B5] opacity-0 -translate-y-2 pointer-events-none transition-all duration-300 ease-in-out z-[98]">
            <div class="relative">
                <input type="text" placeholder="Search"
                    class="w-full h-[48px] bg-[#F5F5F5] pl-[38px] text-[#656565] font-inter text-[16px] font-medium outline-none rounded-[8px] p-[12px]">
                <div class="absolute w-[24px] h-[24px] left-[12px] top-1/2 -translate-y-1/2">
                    <i class="fa-sharp fa-solid fa-magnifying-glass" style="color:#656565;"></i>
                </div>
            </div>
        </div>

        <button id="mobile-menu"
            class="hidden max-[960px]:block absolute top-[25%] right-[5%] translate-x-[5%] translate-y-[20%] z-[100]"
            aria-label="Toggle menu" aria-expanded="false">
            <span id="bar1"
                class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar2"
                class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
            <span id="bar3"
                class="block w-[25px] h-[3px] my-[5px] mx-auto bg-black transition-all duration-300 ease-in-out cursor-pointer"></span>
        </button>

        <div id="navbar-menu"
            class="nav h-[19px] w-[323px] flex items-center gap-x-[45px] max-[960px]:grid max-[960px]:grid-cols-1 max-[960px]:gap-y-0 max-[960px]:m-0 max-[960px]:w-full max-[960px]:absolute max-[960px]:left-0 max-[960px]:top-[-1000px] max-[960px]:opacity-100 max-[960px]:transition-all max-[960px]:duration-500 max-[960px]:ease-in-out max-[960px]:z-[-1] max-[960px]:[&.active]:bg-[#ffffff] max-[960px]:[&.active]:top-full max-[960px]:[&.active]:z-[99] max-[960px]:[&.active]:h-[60vh] max-[960px]:[&.active]:text-[1.6rem] max-[960px]:[&.active]:p-0">
            <span
                class="font-inter text-[16px] font-medium text-[#000000] w-[46px] h-[19px] leading-none opacity-30 max-[960px]:w-full max-[960px]:opacity-100">
                <a id="home-page"
                    class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[30px]"
                    href="index.html">Home</a>
            </span>
            <span
                class="w-[46px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none max-[960px]:w-full max-[960px]:opacity-100">
                <a id="about-page"
                    class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[80px]"
                    href="About.html">About</a>
            </span>
            <span
                class="w-[86px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none whitespace-nowrap max-[960px]:w-full max-[960px]:opacity-100">
                <a id="contact-page"
                    class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[130px]"
                    href="">Contact Us </a>
            </span>
            <span
                class="w-[34px] h-[19px] text-[#000000] opacity-30 font-inter font-medium text-[16px] leading-none max-[960px]:w-full max-[960px]:opacity-100">
                <a id="blog-page"
                    class="max-[960px]:block max-[960px]:text-left max-[960px]:py-[10px] max-[960px]:w-full max-[960px]:table max-[960px]:pl-[25px] max-[960px]:-mt-[180px]"
                    href="">Blog</a>
            </span>
        </div>
        <div
            class="icons w-[126px] h-[32px] flex items-center justify-between max-[960px]:flex max-[960px]:w-full max-[960px]:justify-center max-[960px]:gap-x-[10px] mt-[8px] ml-[20px]">
            <span class="h-[32px] w-[32px] opacity-60">
                <a href="">
                    <i class="fa-regular fa-heart" style="color:#000000;"></i>
                </a>
            </span>
            <span class="h-[32px] w-[32px] opacity-60">
                <a href="">
                    <i class="fa-solid fa-cart-shopping" style="color:#000000;"></i>
                </a>
            </span>
            <span class="h-[32px] w-[32px] opacity-60">
                <a href="login-signup/login.html">
                    <i class="fa-regular fa-user" style="color:#000000;"></i>
                </a>
            </span>
        </div>
    </nav>

    <!-- payment section -->
    <div class="payment max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- progress -->
        <div class="aia flex items-center mb-12 w-[60%] mx-auto">
            <!-- step 1 -->
            <div class="flex items-center gap-2 text-gray-400">
                <div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-[15px] text-white">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                </div>
                <div class="hidden sm:block">
                    <p class="text-md">Step 1</p>
                    <p class="text-sm font-medium">Cart</p>
                </div>
            </div>

            <!-- connector -->
            <div class="flex-1 h-px bg-gray-100 mx-4"></div>

            <!-- step 2 -->
            <div class="flex items-center gap-2 text-black">
                <div class="w-10 h-10 rounded-full bg-black flex items-center justify-center text-[15px] text-white">
                    <i class="fa-solid fa-credit-card"></i>
                </div>
                <div class="hidden sm:block">
                    <p class="text-md">Step 2</p>
                    <p class="text-sm font-bold">Payment</p>
                </div>
            </div>
        </div>
    </div>

</body>
